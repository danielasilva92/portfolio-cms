<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a23, #1a1a3e, #0f0f2e);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
            padding: 2rem;
            overflow: hidden;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .login-card {
            width: min(420px, 100%);
            background: rgba(10, 10, 35, 0.85);
            backdrop-filter: blur(14px);
            border-radius: 20px;
            padding: 2.5rem 2.2rem;
            box-shadow: 0 0 40px rgba(0, 245, 255, 0.35),
            0 0 80px rgba(255, 0, 255, 0.15);
            border: 1px solid rgba(0, 245, 255, 0.35);
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 0.3rem;
            background: linear-gradient(45deg, #00f5ff, #ff00ff, #00ff88);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 4s ease infinite;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.85);
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.35);
            color: white;
            outline: none;
            margin-bottom: 1.2rem;
            transition: all 0.25s;
        }

        input:focus {
            border-color: #00f5ff;
            box-shadow: 0 0 0 3px rgba(0, 245, 255, 0.25);
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            color: white;
            background: linear-gradient(45deg, #00f5ff, #ff00ff);
            box-shadow: 0 8px 30px rgba(0, 245, 255, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(0, 245, 255, 0.6);
        }

        .error {
            display: none;
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            background: rgba(255, 0, 255, 0.15);
            border: 1px solid rgba(255, 0, 255, 0.4);
            color: white;
            text-align: center;
        }

        .back {
            margin-top: 1.4rem;
            text-align: center;
        }

        .back a {
            color: #00f5ff;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
<div class="login-card">
    <h1>Admin Login</h1>
    <p class="subtitle">Access your portfolio dashboard</p>

    <form method="post" action="/login">
        <label for="username">Username</label>
        <input id="username" name="username" required autocomplete="username"/>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" required autocomplete="current-password"/>

        <button class="btn" type="submit">Sign In</button>

        <div class="error" id="errorBox">
            Invalid username or password
        </div>
    </form>

    <div class="back">
        <a href="/">← Back to portfolio</a>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("error") === "true") {
        document.getElementById("errorBox").style.display = "block";
    }
</script>
</body>
</html>
